<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>购物归档</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; background: linear-gradient(135deg,#1a1a2e,#16213e,#0f3460); font-family: sans-serif; color: #fff; padding-bottom: 40px; }
    #toast { display:none; position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#1e293b; border:1px solid #334155; border-radius:12px; padding:10px 24px; z-index:999; font-size:14px; box-shadow:0 4px 20px rgba(0,0,0,.4); }
    .header { background:rgba(255,255,255,.05); backdrop-filter:blur(10px); padding:20px 24px; border-bottom:1px solid rgba(255,255,255,.1); }
    .header h1 { font-size:22px; font-weight:700; letter-spacing:1px; }
    .header p { margin-top:4px; font-size:13px; color:#94a3b8; }
    .input-box { margin:20px 16px; background:rgba(255,255,255,.07); border-radius:16px; padding:16px; border:1px solid rgba(255,255,255,.1); }
    textarea { width:100%; background:transparent; border:none; color:#fff; font-size:14px; resize:none; outline:none; font-family:sans-serif; }
    #error { color:#f87171; font-size:12px; margin:4px 0 8px; }
    #addBtn { width:100%; padding:12px; border-radius:10px; border:none; background:linear-gradient(90deg,#a855f7,#ec4899); color:#fff; font-weight:700; font-size:15px; cursor:pointer; }
    #addBtn:disabled { background:#334155; cursor:not-allowed; }
    .tabs { padding:0 16px 8px; overflow-x:auto; white-space:nowrap; }
    .tab { display:inline-flex; align-items:center; gap:6px; margin-right:6px; padding:8px 16px; border-radius:20px; border:1px solid rgba(255,255,255,.15); background:rgba(255,255,255,.06); color:#fff; font-size:13px; cursor:pointer; }
    .tab.active { border:none; font-weight:700; }
    .badge { background:rgba(0,0,0,.2); border-radius:10px; padding:1px 7px; font-size:11px; }
    .subtabs { padding:8px 16px; overflow-x:auto; white-space:nowrap; }
    .subtab { display:inline-block; margin-right:4px; padding:5px 12px; border-radius:14px; border:1px solid rgba(255,255,255,.1); background:rgba(255,255,255,.04); color:#fff; font-size:12px; cursor:pointer; }
    .subtab.active { background:#f472b6; border:none; }
    .items { padding:12px 16px; }
    .item { background:rgba(255,255,255,.06); border-radius:14px; padding:14px; margin-bottom:10px; border:1px solid rgba(255,255,255,.08); display:flex; align-items:flex-start; gap:12px; }
    .item-icon { width:42px; height:42px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
    .item-body { flex:1; min-width:0; }
    .item-name { font-weight:600; font-size:14px; margin-bottom:4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .item-tags { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:6px; }
    .tag { border-radius:6px; padding:2px 8px; font-size:11px; font-weight:600; }
    .tag-gray { background:rgba(255,255,255,.08); color:#94a3b8; font-weight:400; }
    .item-link { color:#818cf8; font-size:11px; text-decoration:none; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; display:block; }
    .del-btn { background:none; border:none; color:#475569; cursor:pointer; font-size:16px; padding:4px; flex-shrink:0; }
    .empty { text-align:center; padding:60px 0; color:#475569; }
    .empty div { font-size:40px; }
    .empty p { margin-top:12px; font-size:14px; }
    .api-warning { background: rgba(251,191,36,.1); border:1px solid rgba(251,191,36,.3); border-radius:12px; padding:12px 16px; margin:0 16px 16px; font-size:12px; color:#fcd34d; line-height:1.6; }
  </style>
</head>
<body>

<div id="toast"></div>

<div class="header">
  <h1>🛍️ 购物归档</h1>
  <p>粘贴链接，AI 自动识别分类</p>
</div>

<div class="api-warning">
  ⚠️ 首次使用请先填写你的 API Key：
  <input id="apiKey" type="password" placeholder="输入 Anthropic API Key (sk-ant-...)" style="width:100%;margin-top:6px;padding:6px 10px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:rgba(0,0,0,.3);color:#fff;font-size:12px;outline:none;" />
</div>

<div class="input-box">
  <textarea id="urlInput" rows="3" placeholder="粘贴购买链接（淘宝、小红书、Amazon 等）..."></textarea>
  <p id="error"></p>
  <button id="addBtn" onclick="handleAdd()">✨ 自动归档</button>
</div>

<div class="tabs" id="tabs"></div>
<div class="subtabs" id="subtabs"></div>
<div class="items" id="items"></div>

<script>
const CATEGORIES = {
  美妆: { icon:"💄", color:"#ff6b9d", sub:["眼影","粉底","口红","腮红","睫毛膏","眼线","高光","修容","其他美妆"] },
  香薰: { icon:"🕯️", color:"#a78bfa", sub:[] },
  香氛: { icon:"🌸", color:"#f9a8d4", sub:[] },
  香水: { icon:"✨", color:"#fbbf24", sub:[] },
  衣服: { icon:"👗", color:"#34d399", sub:[] },
  其他: { icon:"📦", color:"#94a3b8", sub:[] },
};

let items = JSON.parse(localStorage.getItem("shopping_archive_v1") || "[]");
let activeTab = "all";
let activeSub = "";

function save() { localStorage.setItem("shopping_archive_v1", JSON.stringify(items)); }

function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg; el.style.display = "block";
  setTimeout(() => el.style.display = "none", 2500);
}

async function handleAdd() {
  const url = document.getElementById("urlInput").value.trim();
  const apiKey = document.getElementById("apiKey").value.trim();
  if (!url) return;
  if (!apiKey) { document.getElementById("error").textContent = "请先输入 API Key"; return; }
  const btn = document.getElementById("addBtn");
  btn.disabled = true; btn.textContent = "⏳ AI 识别中...";
  document.getElementById("error").textContent = "";
  try {
    const result = await analyzeWithAI(url, apiKey);
    items.unshift({ id: Date.now(), url, category: result.category||"其他", subCategory: result.subCategory||"", name: result.name||"未知商品", platform: result.platform||"其他", addedAt: new Date().toLocaleDateString("zh-CN") });
    save(); document.getElementById("urlInput").value = "";
    renderAll(); toast("✅ 已成功归档！");
  } catch(e) {
    document.getElementById("error").textContent = "识别失败：" + e.message;
  }
  btn.disabled = false; btn.textContent = "✨ 自动归档";
}

async function analyzeWithAI(url, apiKey) {
  const prompt = `你是购物链接分类助手。分析以下URL，返回JSON（只返回JSON不要其他文字）：
{"category":"美妆|香薰|香氛|香水|衣服|其他","subCategory":"如是美妆填:眼影/粉底/口红/腮红/睫毛膏/眼线/高光/修容/其他美妆；否则填空","name":"商品名称15字内","platform":"淘宝|天猫|京东|小红书|Amazon|其他"}
链接: ${url}
规则：eye/眼影→美妆眼影，foundation/粉底→美妆粉底，lip/口红→美妆口红，candle/蜡烛/香薰→香薰，perfume/fragrance/香水→香水，roomspray/香氛→香氛，衣/裙/裤/dress/shirt/coat→衣服`;
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{ "Content-Type":"application/json", "x-api-key": apiKey, "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true" },
    body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:500, messages:[{role:"user",content:prompt}] })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  const text = data.content.map(i=>i.text||"").join("");
  return JSON.parse(text.replace(/```json|```/g,"").trim());
}

function deleteItem(id) {
  items = items.filter(i => i.id !== id);
  save(); renderAll(); toast("🗑️ 已删除");
}

function renderAll() {
  renderTabs(); renderSubtabs(); renderItems();
}

function renderTabs() {
  const counts = {};
  items.forEach(i => counts[i.category] = (counts[i.category]||0)+1);
  const tabs = ["all",...Object.keys(CATEGORIES)];
  document.getElementById("tabs").innerHTML = tabs.map(key => {
    const c = CATEGORIES[key];
    const count = key==="all" ? items.length : (counts[key]||0);
    const bg = activeTab===key ? (c?.color||"#6366f1") : "rgba(255,255,255,.06)";
    const border = activeTab===key ? "none" : "1px solid rgba(255,255,255,.15)";
    return `<button class="tab${activeTab===key?" active":""}" style="background:${bg};border:${border}" onclick="setTab('${key}')">
      ${key==="all"?"🗂️ 全部":`${c.icon} ${key}`} <span class="badge">${count}</span>
    </button>`;
  }).join("");
}

function renderSubtabs() {
  const cat = CATEGORIES[activeTab];
  const subs = cat?.sub || [];
  if (!subs.length) { document.getElementById("subtabs").innerHTML=""; return; }
  document.getElementById("subtabs").innerHTML = ["",...subs].map(s =>
    `<button class="subtab${activeSub===s?" active":""}" onclick="setSub('${s}')">${s||"全部子类"}</button>`
  ).join("");
}

function renderItems() {
  const filtered = items.filter(item => {
    if (activeTab!=="all" && item.category!==activeTab) return false;
    if (activeSub && item.subCategory!==activeSub) return false;
    return true;
  });
  if (!filtered.length) {
    document.getElementById("items").innerHTML = `<div class="empty"><div>📭</div><p>还没有归档的商品</p></div>`;
    return;
  }
  document.getElementById("items").innerHTML = filtered.map(item => {
    const c = CATEGORIES[item.category]||CATEGORIES["其他"];
    const shortUrl = item.url.length>50 ? item.url.slice(0,50)+"..." : item.url;
    return `<div class="item">
      <div class="item-icon" style="background:${c.color}33">${c.icon}</div>
      <div class="item-body">
        <div class="item-name">${item.name}</div>
        <div class="item-tags">
          <span class="tag" style="background:${c.color}33;color:${c.color}">${item.category}${item.subCategory?" · "+item.subCategory:""}</span>
          <span class="tag tag-gray">${item.platform}</span>
          <span class="tag tag-gray">${item.addedAt}</span>
        </div>
        <a class="item-link" href="${item.url}" target="_blank">🔗 ${shortUrl}</a>
      </div>
      <button class="del-btn" onclick="deleteItem(${item.id})">🗑️</button>
    </div>`;
  }).join("");
}

function setTab(t) { activeTab=t; activeSub=""; renderAll(); }
function setSub(s) { activeSub=s; renderItems(); renderSubtabs(); }

renderAll();
</script>
</body>
</html>
