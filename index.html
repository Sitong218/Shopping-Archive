<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>我的购物归档</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#f5f0eb;font-family:'PingFang SC',sans-serif;color:#3d3530;padding-bottom:80px}
#toast{display:none;position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#3d3530;color:#f5f0eb;border-radius:12px;padding:10px 24px;z-index:999;font-size:13px;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.header{background:#f5f0eb;padding:20px 16px 0;position:sticky;top:0;z-index:10;border-bottom:1px solid #e8e0d8}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.header-top h1{font-size:20px;font-weight:700;letter-spacing:1px}
.header-top p{font-size:12px;color:#9e8e84;margin-top:2px}
.add-btn{width:38px;height:38px;border-radius:50%;background:#c9a8a8;border:none;color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;flex-shrink:0}
.tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid #d8cfc8;background:transparent;color:#7a6e68;font-size:12px;cursor:pointer;transition:all .2s}
.tab.active{border:none;color:#fff;font-weight:600}
.waterfall{display:flex;gap:10px;padding:12px 10px;align-items:flex-start}
.col{flex:1;display:flex;flex-direction:column;gap:10px}
.card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.card img{width:100%;display:block;object-fit:cover}
.card-placeholder{width:100%;aspect-ratio:3/4;display:flex;align-items:center;justify-content:center;font-size:40px}
.card-body{padding:10px 10px 12px}
.card-name{font-size:13px;font-weight:500;line-height:1.5;margin-bottom:8px;color:#3d3530}
.card-bottom{display:flex;align-items:center;justify-content:space-between;gap:4px}
.card-tags{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.tag-cat{font-size:10px;font-weight:600;padding:2px 7px;border-radius:8px}
.tag-color{font-size:10px;font-weight:600;padding:2px 8px;border-radius:8px;color:#fff;letter-spacing:.3px}
.card-date{font-size:11px;color:#c9bdb6;white-space:nowrap;flex-shrink:0}
.empty{text-align:center;padding:60px 0;color:#b0a49c}
.empty div{font-size:40px}
.empty p{margin-top:12px;font-size:14px}
/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:#faf7f4;border-radius:24px 24px 0 0;padding:24px 20px 44px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal h2{font-size:17px;font-weight:700;margin-bottom:4px;color:#3d3530}
.modal .subtitle{font-size:12px;color:#b0a49c;margin-bottom:18px}
.modal label{display:block;font-size:12px;color:#9e8e84;margin-bottom:5px;margin-top:14px}
.modal textarea{width:100%;padding:10px 12px;border-radius:10px;border:1px solid #e0d9d2;background:#fff;font-size:14px;color:#3d3530;outline:none;font-family:inherit;resize:none;height:80px}
.img-upload{border:1.5px dashed #d8cfc8;border-radius:12px;padding:18px;text-align:center;cursor:pointer;color:#b0a49c;font-size:13px;background:#fff}
.img-preview{width:100%;border-radius:10px;margin-top:8px;object-fit:cover;max-height:200px;display:none}
.modal-btns{display:flex;gap:10px;margin-top:20px}
.btn-cancel{flex:1;padding:12px;border-radius:12px;border:1px solid #d8cfc8;background:transparent;color:#7a6e68;font-size:14px;cursor:pointer}
.btn-submit{flex:2;padding:12px;border-radius:12px;border:none;background:#c9a8a8;color:#fff;font-size:14px;font-weight:700;cursor:pointer}
.btn-submit:disabled{background:#d8cfc8;cursor:not-allowed}
.merror{color:#c9a8a8;font-size:12px;margin-top:6px;min-height:16px}
.api-bar{background:#fff8f0;border-bottom:1px solid #ede8e3;padding:10px 16px;display:flex;align-items:center;gap:8px}
.api-bar input{flex:1;padding:7px 10px;border-radius:8px;border:1px solid #e0d9d2;font-size:12px;background:#fff;color:#3d3530;outline:none}
.api-bar span{font-size:11px;color:#b0a49c;white-space:nowrap}
</style>
</head>
<body>
<div id="toast"></div>

<div class="api-bar">
  <span>🔑 API Key</span>
  <input id="apiKey" type="password" placeholder="粘贴你的 sk-ant-... Key" oninput="localStorage.setItem('apiKey',this.value)"/>
</div>

<div class="header">
  <div class="header-top">
    <div>
      <h1>🛍️ 我的购物归档</h1>
      <p id="countLabel">0 件好物 · 按色系排列</p>
    </div>
    <button class="add-btn" onclick="openModal()">＋</button>
  </div>
  <div class="tabs" id="tabs"></div>
</div>

<div class="waterfall" id="waterfall">
  <div class="col" id="col0"></div>
  <div class="col" id="col1"></div>
</div>
<div class="empty" id="empty" style="display:none"><div>📭</div><p>还没有归档的好物</p></div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <h2>✨ 添加好物</h2>
    <p class="subtitle">粘贴链接，AI 自动识别分类与色系</p>
    <label>购买链接</label>
    <textarea id="mUrl" placeholder="粘贴淘宝、小红书、Amazon 等购买链接..."></textarea>
    <label>商品图片（可选）</label>
    <div class="img-upload" onclick="document.getElementById('imgFile').click()">
      📷 点击上传截图或商品图
      <input type="file" id="imgFile" accept="image/*" style="display:none" onchange="handleImg(event)"/>
    </div>
    <img id="imgPreview" class="img-preview"/>
    <p class="merror" id="mError"></p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-submit" id="submitBtn" onclick="handleAdd()">AI 自动归档</button>
    </div>
  </div>
</div>

<script>
const CATS = {
  全部:{icon:"🗂️",color:"#b5a99a"},
  美妆:{icon:"💄",color:"#c9a8a8"},
  香薰:{icon:"🕯️",color:"#a8b5c9"},
  香氛:{icon:"🌸",color:"#c9a8c0"},
  香水:{icon:"✨",color:"#c9c4a8"},
  衣服:{icon:"👗",color:"#a8c9b5"},
  其他:{icon:"📦",color:"#b5b5b5"},
};

const COLOR_ORDER = [
  "白色","米色","裸色","奶茶色",
  "蜜桃粉","豆沙红","珊瑚橙","玫瑰金",
  "樱桃红","正红","砖红","深枣红",
  "橘色","焦糖色","太妃色","咖啡色","大地色",
  "莓果紫","梅子色","黑色","其他色",""
];

const COLOR_HEX = {
  蜜桃粉:"#e8909f",豆沙红:"#b87070",樱桃红:"#b03030",玫瑰金:"#c49898",
  珊瑚橙:"#d4845a",橘色:"#c96e2e",裸色:"#c49060",奶茶色:"#b89060",
  深枣红:"#7a3030",太妃色:"#8e6840",焦糖色:"#a86e28",
  正红:"#bb2020",砖红:"#9e4e2a",
  莓果紫:"#8a4aa0",梅子色:"#6e3088",
  大地色:"#7a6040",咖啡色:"#604030",
  白色:"#c8c0b8",黑色:"#3d3530",米色:"#c8b89a",其他色:"#a0a0a0"
};

let items = JSON.parse(localStorage.getItem("archive_v3")||"[]");
let activeTab = "全部";
let imgBase64 = "";

function save(){ localStorage.setItem("archive_v3", JSON.stringify(items)); }
function toast(m){ const e=document.getElementById("toast"); e.textContent=m; e.style.display="block"; setTimeout(()=>e.style.display="none",2500); }
function openModal(){ document.getElementById("overlay").classList.add("open"); }
function closeModal(){
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("mUrl").value="";
  document.getElementById("mError").textContent="";
  document.getElementById("imgPreview").style.display="none";
  document.getElementById("imgFile").value="";
  imgBase64="";
}
function handleOverlayClick(e){ if(e.target===document.getElementById("overlay")) closeModal(); }

function handleImg(e){
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=ev=>{
    imgBase64=ev.target.result;
    const p=document.getElementById("imgPreview");
    p.src=imgBase64; p.style.display="block";
  };
  r.readAsDataURL(file);
}

async function handleAdd(){
  const url=document.getElementById("mUrl").value.trim();
  const apiKey=document.getElementById("apiKey").value.trim();
  if(!url){ document.getElementById("mError").textContent="请粘贴购买链接"; return; }
  if(!apiKey){ document.getElementById("mError").textContent="请先填写 API Key"; return; }
  const btn=document.getElementById("submitBtn");
  btn.disabled=true; btn.textContent="⏳ AI 识别中...";
  document.getElementById("mError").textContent="";
  try {
    const result = await analyzeAI(url, apiKey);
    items.unshift({
      id:Date.now(), url,
      category:result.category||"其他",
      subCategory:result.subCategory||"",
      name:result.name||"未知商品",
      platform:result.platform||"其他",
      colorName:result.colorName||"",
      image:imgBase64||"",
      addedAt:new Date().toLocaleDateString("zh-CN")
    });
    save(); closeModal(); renderAll(); toast("✅ 归档成功！");
  } catch(e){
    document.getElementById("mError").textContent="识别失败："+e.message;
  }
  btn.disabled=false; btn.textContent="AI 自动归档";
}

async function analyzeAI(url, apiKey){
  const colorList = Object.keys(COLOR_HEX).join("、");
  const prompt = `你是购物链接分类助手。分析以下URL，只返回JSON，不要其他文字：
{"category":"美妆|香薰|香氛|香水|衣服|其他","subCategory":"美妆填:眼影/粉底/口红/腮红/睫毛膏/眼线/高光/修容/其他美妆；其他类别填空","name":"商品名称20字内","platform":"淘宝|天猫|京东|小红书|Amazon|其他","colorName":"有颜色属性的商品从以下选最接近的：${colorList}；无颜色属性填空"}
链接: ${url}`;
  const res = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:400,messages:[{role:"user",content:prompt}]})
  });
  const data=await res.json();
  if(data.error) throw new Error(data.error.message);
  const text=data.content.filter(i=>i.type==="text").map(i=>i.text).join("");
  return JSON.parse(text.replace(/```json|```/g,"").trim());
}

function deleteItem(id){
  if(!confirm("确认删除？")) return;
  items=items.filter(i=>i.id!==id);
  save(); renderAll(); toast("🗑️ 已删除");
}

function sortByColor(list){
  return [...list].sort((a,b)=>{
    const ai=COLOR_ORDER.indexOf(a.colorName??"")===-1?COLOR_ORDER.length:COLOR_ORDER.indexOf(a.colorName??"");
    const bi=COLOR_ORDER.indexOf(b.colorName??"")===-1?COLOR_ORDER.length:COLOR_ORDER.indexOf(b.colorName??"");
    return ai-bi;
  });
}

function renderAll(){ renderTabs(); renderWaterfall(); }

function renderTabs(){
  const counts={};
  items.forEach(i=>counts[i.category]=(counts[i.category]||0)+1);
  document.getElementById("tabs").innerHTML=Object.entries(CATS).map(([k,v])=>{
    const n=k==="全部"?items.length:(counts[k]||0);
    const active=activeTab===k;
    return `<button class="tab${active?" active":""}" style="${active?`background:${v.color};border:none`:""}" onclick="setTab('${k}')">${v.icon} ${k} ${n}</button>`;
  }).join("");
}

function renderWaterfall(){
  const base = activeTab==="全部" ? items : items.filter(i=>i.category===activeTab);
  const sorted = sortByColor(base);
  const left=sorted.filter((_,i)=>i%2===0);
  const right=sorted.filter((_,i)=>i%2===1);
  document.getElementById("empty").style.display=sorted.length?"none":"block";
  document.getElementById("waterfall").style.display=sorted.length?"flex":"none";
  document.getElementById("countLabel").textContent=sorted.length+" 件好物 · 按色系排列";
  [left,right].forEach((col,ci)=>{
    document.getElementById("col"+ci).innerHTML=col.map(item=>{
      const c=CATS[item.category]||CATS["其他"];
      const hex=COLOR_HEX[item.colorName]||null;
      const imgHtml=item.image
        ?`<img src="${item.image}" style="width:100%;display:block;object-fit:cover;max-height:280px"/>`
        :`<div class="card-placeholder" style="background:${c.color}22">${c.icon}</div>`;
      const colorTag=hex
        ?`<span class="tag-color" style="background:${hex}">${item.colorName}</span>`:"";
      return `<div class="card">
        ${imgHtml}
        <div class="card-body">
          <p class="card-name">${item.name}</p>
          <div class="card-bottom">
            <div class="card-tags">
              <span class="tag-cat" style="background:${c.color}33;color:${c.color}">${item.category}${item.subCategory?" · "+item.subCategory:""}</span>
              ${colorTag}
            </div>
            <span class="card-date" style="display:flex;align-items:center;gap:4px">
              ${item.addedAt}
              <button onclick="deleteItem(${item.id})" style="background:none;border:none;color:#d8cfc8;cursor:pointer;font-size:13px;padding:0;line-height:1">🗑</button>
            </span>
          </div>
        </div>
      </div>`;
    }).join("");
  });
}

function setTab(t){ activeTab=t; renderAll(); }
const savedKey = localStorage.getItem('apiKey');
if(savedKey) document.getElementById('apiKey').value = savedKey;
renderAll();
</script>
</body>
</html>
